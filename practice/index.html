<!DOCTYPE html>
<html lang="ko">
<head>
    <title>투 두 리스트!</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="practice.css" />
</head>
<body>
    <div class=container>
        
        <div class="js-clock clock">
            <h1>00:00</h1>
        </div>
        
        <form class="js-form form margin1">
            <input type="text" placeholder="What is your name?" />
            <input type="submit" value="이름 입력" />
        </form>
        
        <h3 class="js-greetings greetings"></h3>

        <input class="js-btn btn margin2" type="button" value="다시 입력" />

        
        <form class="js-toDoForm margin1">
            <input type="text" placeholder="Write a to do" />
            <input type="submit" value="할 일 입력" />
        </form>

        <ul class="js-toDoList">
        </ul>

    </div>
    <script src="clock.js"></script>
    <script src="greeting.js"></script>
    <script src="todo.js"></script>
    <script src="bg.js"></script>
</body>
</html>
